<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<!-- MOBILE FIX -->
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- APP STYLE -->
<meta name="theme-color" content="#0077b6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Aggrey POS System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:manipulation;
    overscroll-behavior:none;
    -webkit-user-select:none;
    user-select:none;
}

/* BODY */
body{
    background:#eef2f7;
    display:flex;
    justify-content:center;
}

/* APP */
.app{
    width:100%;
    max-width:450px;
    height:100vh;
    background:white;
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
}

/* TOP */
.top{
    background:rgba(0,119,182,0.95);
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    position:sticky;
    top:0;
    z-index:99;
}

/* PAGE */
.page{
    display:none;
    padding:15px;
    flex:1;
    overflow-y:auto;
    padding-bottom:90px;
}

.active{
    display:block;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:rgba(0,119,182,0.9);
    color:white;
    border:none;
    border-radius:10px;
    margin-top:8px;
    cursor:pointer;
    font-size:16px;
}

/* LOGIN PAGE */
#login{
    position:fixed;
    width:100%;
    height:100%;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    overflow-y:auto;
    padding:20px;
}

.loginBox{
    width:90%;
    max-width:320px;
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

/* HIDE APP BEFORE LOGIN */
.app{
    display:none;
}

/* PROFILE PHOTO */
.profilePreview{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #0f172a;
    margin:10px auto;
    cursor:pointer;
    display:block;
}

#fileInput{
    display:none;
}

/* CARD */
.card{
    background:#f8fafc;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border-left:4px solid #0f172a;
    word-wrap:break-word;
}

/* PAGE HEADER */
.pageHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:rgba(0,119,182,0.9);
    color:white;
    border-radius:8px;
    margin-bottom:10px;
}

/* LOGOUT BUTTON */
.logoutBtn{
    background:rgba(205,95,55);
    border:none;
    color:white;
    width:80px;
    padding:8px;
    border-radius:6px;
    cursor:pointer;
}

/* DELETE BUTTON */
.delBtn{
    background-color: rgba(205, 95, 55);;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

/* CHANGE PASSWORD BUTTON */
.changeBtn{
    background:green;
}

/* FIXED NAVIGATION */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    max-width:450px;

    display:flex;
    justify-content:space-around;
    align-items:center;

    background:rgba(0,119,182,0.95);

    padding:10px;

    z-index:999;
}

/* NAV BUTTONS */
.nav button{
    background:none;
    border:none;
    color:white;
    font-size:15px;
    margin:0;
    width:auto;
}

hr{
    margin:15px 0;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">

<div class="loginBox">

<h3>Aggrey POS System</h3>

<!-- PROFILE PHOTO -->
<img id="preview"
class="profilePreview"
src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
onclick="document.getElementById('fileInput').click()">

<input type="file"
id="fileInput"
accept="image/*"
onchange="loadPhoto(event)">

<!-- LOGIN -->
<input id="user" placeholder="Username">

<input id="pass"
type="password"
placeholder="Password">

<button onclick="login()">Login</button>

<hr>

<h4>Change Password</h4>

<input id="oldPass"
type="password"
placeholder="Old Password">

<input id="newPass"
type="password"
placeholder="New Password">

<button class="changeBtn"
onclick="changePassword()">
Change Password
</button>

</div>
</div>

<!-- APP -->
<div class="app" id="app">

<!-- TOP -->
<div class="top">
Aggrey POS System
</div>

<!-- PAGE 1 -->
<div id="salePage" class="page active">

<div class="pageHeader">
<h3>POS</h3>

<button class="logoutBtn"
onclick="logout()">
Logout
</button>
</div>

<input id="product"
placeholder="Product">

<input id="price"
type="number"
placeholder="Price">

<input id="qty"
type="number"
placeholder="Qty">

<button onclick="addSale()">
Save Sale
</button>

<div class="card">
Total: TSH <span id="total">0</span>
</div>

</div>

<!-- PAGE 2 -->
<div id="historyPage" class="page">

<div class="pageHeader">
<h3>History</h3>

<button class="logoutBtn"
onclick="logout()">
Logout
</button>
</div>

<div id="history"></div>

</div>

<!-- PAGE 3 -->
<div id="summaryPage" class="page">

<div class="pageHeader">
<h3>Summary</h3>

<button class="logoutBtn"
onclick="logout()">
Logout
</button>
</div>

<div class="card">
Total: TSH <span id="total2">0</span>
</div>

<div class="card">
Items: <span id="items">0</span>
</div>

<button onclick="sendWhatsApp()"
style="background-color: rgba(205, 95, 55);">
Send Report to Boss
</button>

</div>

<!-- NAVIGATION -->
<div class="nav">

<button onclick="show('salePage')">
POS
</button>

<button onclick="show('historyPage')">
History
</button>

<button onclick="show('summaryPage')">
Summary
</button>

</div>

</div>

<script>

/* PASSWORD */
if(!localStorage.getItem("password")){
localStorage.setItem("password","1234");
}

/* STORAGE */
let sales =
JSON.parse(localStorage.getItem("mobilePOS")) || [];

/* AUTO DELETE AFTER 7 DAYS */
function cleanOldData(){

let week =
7 * 24 * 60 * 60 * 1000;

let now = Date.now();

sales = sales.filter(s =>
(now - s.time) < week
);

localStorage.setItem(
"mobilePOS",
JSON.stringify(sales)
);

}

/* PROFILE PHOTO */
function loadPhoto(event){

let file = event.target.files[0];

let reader = new FileReader();

reader.onload = function(){

localStorage.setItem(
"profilePic",
reader.result
);

document.getElementById(
"preview"
).src = reader.result;

};

reader.readAsDataURL(file);

}

/* PAGE LOAD */
window.onload = function(){

cleanOldData();

let pic =
localStorage.getItem("profilePic");

if(pic){

document.getElementById(
"preview"
).src = pic;

}

render();

};

/* LOGIN */
function login(){

let u =
document.getElementById("user").value;

let p =
document.getElementById("pass").value;

if(u==="admin" &&
p===localStorage.getItem("password")){

document.getElementById(
"login"
).style.display="none";

document.getElementById(
"app"
).style.display="flex";

show("salePage");

}else{

alert("Wrong Password");

}

}

/* CHANGE PASSWORD */
function changePassword(){

let oldP =
document.getElementById("oldPass").value;

let newP =
document.getElementById("newPass").value;

if(oldP !== localStorage.getItem("password")){

alert("Old password wrong");
return;

}

if(newP.length < 4){

alert("Password must be at least 4 characters");
return;

}

localStorage.setItem("password",newP);

alert("Password changed successfully");

document.getElementById("oldPass").value="";
document.getElementById("newPass").value="";

}

/* LOGOUT */
function logout(){

document.getElementById(
"login"
).style.display="flex";

document.getElementById(
"app"
).style.display="none";

document.getElementById("user").value="";
document.getElementById("pass").value="";

}

/* NAVIGATION */
function show(p){

document.querySelectorAll(".page")
.forEach(x=>x.classList.remove("active"));

document.getElementById(p)
.classList.add("active");

}

/* ADD SALE */
function addSale(){

let p =
document.getElementById("product");

let pr =
document.getElementById("price");

let q =
document.getElementById("qty");

if(!p.value || !pr.value || !q.value){

alert("Fill all fields");
return;

}

let total =
Number(pr.value) * Number(q.value);

sales.push({

id:Date.now(),

product:p.value,

price:+pr.value,

qty:+q.value,

total:total,

time:Date.now()

});

localStorage.setItem(
"mobilePOS",
JSON.stringify(sales)
);

p.value="";
pr.value="";
q.value="";

render();

}

/* DELETE SALE */
function deleteSale(id){

sales = sales.filter(s =>
s.id !== id
);

localStorage.setItem(
"mobilePOS",
JSON.stringify(sales)
);

render();

}

/* RENDER */
function render(){

cleanOldData();

let h =
document.getElementById("history");

h.innerHTML="";

let total=0;
let items=0;

sales.forEach(s=>{

total += s.total;
items += s.qty;

h.innerHTML += `

<div class="card">

<b>${s.product}</b><br>

Qty: ${s.qty}<br>

TSH ${s.total}<br>

<small>
${new Date(s.time).toLocaleString()}
</small>

<button class="delBtn"
onclick="deleteSale(${s.id})">
Delete
</button>

</div>

`;

});

document.getElementById("total")
.innerText = total;

document.getElementById("total2")
.innerText = total;

document.getElementById("items")
.innerText = items;

}

/* WHATSAPP REPORT */
function sendWhatsApp(){

let total=0;
let items=0;

let msg =
"🧾 *POS DAILY REPORT*\\n\\n";

sales.forEach(s=>{

total += s.total;
items += s.qty;

msg +=
`• ${s.product}
- Qty:${s.qty}
- TSH ${s.total}\\n`;

});

msg +=
`\\nTOTAL ITEMS: ${items}
\\nTOTAL SALES: TSH ${total}`;

let phone = "255670601120";

let url =
"https://wa.me/" +
phone +
"?text=" +
encodeURIComponent(msg);

window.open(url,"_blank");

}

render();

</script>

</body>
</html>
